<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | DonVictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/validacionLogin.css}">
</head>

<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="text-center">Crear tu cuenta</h2>
            <p class="subtitulo">Únete a DonVictor y disfruta de promociones exclusivas</p>

            <form th:action="@{/procesarRegistro}" method="post" id="formRegistro">
                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" name="telefono" class="form-control" placeholder="987 654 321" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control"
                        placeholder="Mínimo 6 caracteres" required>
                    <small class="text-muted small d-block mt-1">Mínimo 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" class="form-control"
                        placeholder="Repite tu contraseña" required>
                    <span id="passwordError" class="error-message"></span>
                </div>

                <button type="submit" class="btn-auth">Crear cuenta</button>
            </form>
            <!-- Mostrar mensaje de error si existe -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <hr class="separator">

            <div class="footer-auth">
                <p class="text-registro">
                    ¿Ya tienes cuenta?
                    <a th:href="@{/login}">Ingresar</a>
                </p>
                <a th:href="@{/}" class="link-volver">
                    <i class="fas fa-arrow-left"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/validacionLogin.js}"></script>
</body>

</html>
