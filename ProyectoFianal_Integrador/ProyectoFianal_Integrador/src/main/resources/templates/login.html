<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | DonVictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/validacionLogin.css}">
</head>

<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="text-center">Bienvenido de vuelta</h2>
            <p class="subtitulo">Ingresa a tu cuenta para ordenar tus favoritos</p>

            <!-- Formulario con ID -->
            <form th:action="@{/procesarLogin}" method="post" id="formLogin">
                <div class="form-group">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="********" required>
                </div>

                <div class="checkbox-wrapper">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="recordarme" name="recordarme">
                        <label class="form-check-label" for="recordarme">Recordarme</label>
                    </div>
                    <a href="#" class="link-olvide" id="btnOlvidePass">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Botón con ID y texto normal -->
                <button type="submit" class="btn-auth" id="btnIngresar">
                    <span id="btnTexto">Ingresar</span>
                    <span id="btnSpinner" class="spinner" style="display: none;"></span>
                </button>
            </form>
            <!-- Mostrar mensajes -->
            <div th:if="${param.registroExitoso}" class="alert alert-success">
                ¡Registro exitoso! Ahora puedes iniciar sesión.
            </div>
            <div th:if="${param.error}" class="alert alert-danger">
                Correo o contraseña incorrectos.
            </div>

            <hr class="separator">

            <div class="footer-auth">
                <p class="text-registro">
                    ¿No tienes cuenta?
                    <a th:href="@{/registro}">Crear cuenta</a>
                </p>
                <a th:href="@{/}" class="link-volver">
                    <i class="fas fa-arrow-left"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/validacionLogin.js}"></script>
</body>

</html>
